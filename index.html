<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>subzero. | Amal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

</head>


<body>


<!-- Stars background -->
<div id="stars"></div>


<!-- Floating hearts -->
<div id="hearts"></div>



<!-- Intro -->

<div id="intro">

<div class="introLogo">
subzero.
</div>

<p>
a story written in memories...
</p>

</div>





<!-- Password Screen -->

<div id="lockScreen">


<div class="glass login">


<h1>
subzero.
</h1>


<p>
enter the passcode
</p>


<input 
id="password"
type="password"
maxlength="4"
placeholder="••••">


<button id="unlockBtn">
unlock
</button>


<p id="wrong"></p>


</div>


</div>








<!-- Main Website -->


<div id="website">



<!-- Hero -->

<section class="hero">


<div>


<h1 id="heroTitle"></h1>


<p id="heroSubtitle"></p>



<div class="counter glass">

<h3>
days together
</h3>


<span id="days">
0
</span>


</div>



<button id="begin">
open memories
</button>


</div>


</section>







<!-- Letters -->


<section class="letters">


<h2>
letters.
</h2>



<div class="letterBook">


<div class="letter glass">

<h3>
chapter one
</h3>


<p id="letter1"></p>


</div>





<div class="letter glass">

<h3>
chapter two
</h3>


<p id="letter2"></p>


</div>





<div class="letter glass">

<h3>
chapter three
</h3>


<p id="letter3"></p>


</div>



</div>


</section>








<!-- Quote -->


<section class="quote">


<h2 id="quote">

</h2>


</section>








<!-- Ending -->


<section class="ending">


<button id="secretButton">

open the final memory

</button>




<div id="finalScreen">


<h1>
</h1>


<p id="finalMessage">

</p>


</div>



</section>







<footer>

subzero.

</footer>





</div>






<script src="script.js"></script>


</body>

</html>
