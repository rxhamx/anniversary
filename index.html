<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<!-- LOCK SCREEN -->
<section id="lockScreen" class="screen">

    <div class="heart">❤</div>

    <h2>Enter Passcode</h2>

    <div id="dots">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="keypad">

        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>

        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>

        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>

        <button disabled>❤</button>
        <button onclick="press(0)">0</button>
        <button onclick="erase()">⌫</button>

    </div>

</section>

<!-- INTRO -->
<section id="intro" class="screen hidden">

<h1>Happy Anniversary ❤️</h1>

<p id="typing"></p>

<button id="continueBtn">
Continue →
</button>

</section>
<section id="story" class="screen hidden">

<h1>Our Story ❤️</h1>

<div id="storyText">

<p>One year.</p>

<p>365 days.</p>

<p>Thousands of memories.</p>

<p>Some beautiful.</p>

<p>Some difficult.</p>

<p>Every one helped us grow.</p>

</div>

<button id="storyNext">
Continue →
</button>

</section>
<script src="script.js"></script>

</body>
</html>
