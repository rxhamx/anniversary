<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>


<body>


<div id="particles"></div>

<div id="hearts"></div>



<!-- INTRO -->

<div id="intro">

<h1>
Our Story
</h1>

<p>
a place where our memories live ❤️
</p>

</div>






<!-- PASSWORD -->

<div id="lockScreen">


<div class="card login">


<h1>
❤️
</h1>


<h2>
Our Anniversary
</h2>


<p>
enter the special date
</p>


<input 
id="password"
type="password"
maxlength="4"
placeholder="1507">


<button id="unlockBtn">
open
</button>


<p id="wrong"></p>


</div>


</div>







<!-- MAIN WEBSITE -->

<div id="website">





<!-- HERO -->


<section class="hero">


<div class="heroBox">


<h1 id="title"></h1>


<p id="subtitle"></p>





<div class="card counter">


<h3>
days of memories
</h3>


<span id="days">
0
</span>


<p>
together ❤️
</p>


</div>




<button id="start">
read our story
</button>


</div>


</section>







<!-- LETTER -->

<section class="letters">


<h2>
A Letter For Amal ❤️
</h2>




<div class="card letter">


<h3>
Chapter One 🌹
</h3>


<p id="letter1"></p>


</div>





<div class="card letter">


<h3>
Chapter Two ✨
</h3>


<p id="letter2"></p>


</div>





<div class="card letter">


<h3>
Chapter Three 💕
</h3>


<p id="letter3"></p>


</div>




</section>








<!-- QUOTE -->


<section class="quote">


<h2 id="quote"></h2>


</section>








<!-- ENDING -->


<section class="ending">


<button id="finalButton">

open my final words ❤️

</button>




<div id="final">


<h1>
</h1>


<p id="finalText"></p>


</div>


</section>








<footer>

made with love ❤️

</footer>





</div>





<script src="script.js"></script>


</body>

</html>
