<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>subzero. | Amal</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

</head>


<body>


<!-- STAR BACKGROUND -->

<div id="stars"></div>


<!-- MOUSE HEARTS -->

<div id="cursorHeart"></div>


<!-- CINEMATIC INTRO -->

<div id="intro">

<div class="introLogo">
subzero.
</div>

<p>
a story written in memories...
</p>

</div>



<!-- PASSCODE -->

<div id="lockScreen">


<div class="glass login">

<h1>
subzero.
</h1>

<p>
enter our date
</p>


<input 
id="password"
type="password"
maxlength="4"
placeholder="1507">


<button id="unlockBtn">
enter
</button>


<p id="wrong"></p>

</div>


</div>





<!-- MAIN WEBSITE -->


<div id="website">



<!-- HERO -->

<section class="hero">


<div class="heroContent">


<h1 id="heroTitle">
</h1>


<p id="heroSubtitle">
</p>


<div class="counter glass">

<h3>
days together
</h3>

<span id="days">
0
</span>

</div>



<button id="begin">
open memories
</button>


</div>


</section>







<!-- LETTERS -->


<section class="letters">


<h2>
letters.
</h2>



<div class="letterBook">



<div class="letter glass">

<h3>
chapter one
</h3>

<p id="letter1"></p>

</div>




<div class="letter glass">

<h3>
chapter two
</h3>

<p id="letter2"></p>

</div>




<div class="letter glass">

<h3>
chapter three
</h3>

<p id="letter3"></p>

</div>



</div>


</section>








<!-- MEMORY GALLERY -->


<section class="gallery">


<h2>
memories.
</h2>



<div class="galleryGrid">


<img src="images/memory1.jpg" class="memory">

<img src="images/memory2.jpg" class="memory">

<img src="images/memory3.jpg" class="memory">

<img src="images/memory4.jpg" class="memory">


</div>



</section>






<!-- FULLSCREEN IMAGE -->

<div id="viewer">

<img id="viewerImg">

</div>









<!-- QUOTES -->


<section class="quote">


<h2 id="quote">

</h2>


</section>









<!-- FINAL -->


<section class="ending">


<button id="secretButton">

open the final memory

</button>



<div id="finalScreen">


<h1>
</h1>


<p id="finalMessage">
</p>


</div>



</section>








<footer>

subzero.

</footer>




</div>






<!-- MUSIC -->

<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>


<button id="musicBtn">
♫
</button>




<script src="script.js"></script>


</body>

</html>
